# Дополнительный overlay для Mini App: API (FastAPI/uvicorn) + Caddy (авто-HTTPS).
# Запуск вместе с основным compose и серверным override:
#   docker-compose -f docker-compose.yml -f docker-compose.override.yml -f docker-compose.miniapp.yml up -d --build
#
# Требуется в .env: MINIAPP_DOMAIN (например app.example.ru) и MINIAPP_URL (https://app.example.ru).
version: "3.8"

services:
  api:
    build: .
    command: uvicorn app.webapp.server:app --host 127.0.0.1 --port 8081
    env_file: .env
    network_mode: host
    restart: unless-stopped
    depends_on:
      - db

  caddy:
    image: caddy:2
    network_mode: host
    restart: unless-stopped
    environment:
      - MINIAPP_DOMAIN=${MINIAPP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./miniapp:/srv/miniapp:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
