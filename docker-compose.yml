services:
  db:
    image: postgres:16-alpine
    container_name: russian_language_bot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: russian_bot
      POSTGRES_USER: russian_bot
      POSTGRES_PASSWORD: russian_bot_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U russian_bot -d russian_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    container_name: russian_language_bot_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
